<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoFinance — Entrar</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <canvas id="bg-canvas"></canvas>
    <div class="glow-spot glow-a"></div>
    <div class="glow-spot glow-b"></div>

    <div class="badge-3d"><span class="badge-dot"></span>AutoFinance · Web3</div>

    <div class="page">
        <div class="card">

            <div class="card-logo">
                <div class="logo-mark">AF</div>
                <span class="logo-text">AutoFinance</span>
            </div>

            <h1 class="card-title">Bem-vindo de volta.</h1>
            <p class="card-sub">Entre na sua conta para acessar o painel.</p>

            <form id="loginForm" novalidate>

                <div class="field">
                    <label class="field-label" for="email">E-mail</label>
                    <div class="field-wrap">
                        <input type="email" id="email" class="field-input" placeholder="seu@email.com"
                            autocomplete="email" />
                        <span class="field-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                                </path>
                                <polyline points="22,6 12,13 2,6"></polyline>
                            </svg>
                        </span>
                    </div>
                </div>

                <div class="field">
                    <label class="field-label" for="password">Senha</label>
                    <div class="field-wrap">
                        <input type="password" id="password" class="field-input" placeholder="••••••••"
                            autocomplete="current-password" />
                        <span class="field-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </span>
                        <button type="button" class="pwd-toggle" id="pwdToggle">
                            <svg id="eyeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div id="errorMsg" class="error-msg"></div>

                <div class="extras-row">
                    <label class="checkbox-wrap">
                        <input type="checkbox" id="remember" />
                        <span>Lembrar de mim</span>
                    </label>
                    <a href="#" class="forgot-link">Esqueci a senha</a>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">Entrar no painel</button>

            </form>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">ou</span>
                <div class="divider-line"></div>
            </div>

            <p class="card-footer">
                Não tem uma conta? <a href="../register/index.html">Criar conta</a>
            </p>

        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
