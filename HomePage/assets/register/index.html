<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoFinance — Criar conta</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <canvas id="bg-canvas"></canvas>
    <div class="glow-spot glow-a"></div>
    <div class="glow-spot glow-b"></div>

    <div class="badge-3d"><span class="badge-dot"></span>Criar conta</div>

    <div class="page">
        <div class="card">

            <div class="card-logo">
                <div class="logo-mark">AF</div>
                <span class="logo-text">AutoFinance</span>
            </div>

            <div class="steps">
                <div class="step active" id="step1"></div>
                <div class="step" id="step2"></div>
                <div class="step" id="step3"></div>
            </div>

            <h1 class="card-title">Crie sua conta.</h1>
            <p class="card-sub">Comece a controlar suas finanças gratuitamente.</p>

            <form id="registerForm" novalidate>

                <div class="field-row">
                    <div class="field">
                        <label class="field-label" for="firstName">Nome</label>
                        <div class="field-wrap">
                            <input type="text" id="firstName" class="field-input" placeholder="João"
                                autocomplete="given-name" />
                            <span class="field-icon">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </span>
                        </div>
                    </div>
                    <div class="field">
                        <label class="field-label" for="lastName">Sobrenome</label>
                        <div class="field-wrap">
                            <input type="text" id="lastName" class="field-input" placeholder="Silva"
                                autocomplete="family-name" />
                            <span class="field-icon">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </span>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label class="field-label" for="email">E-mail</label>
                    <div class="field-wrap">
                        <input type="email" id="email" class="field-input" placeholder="seu@email.com"
                            autocomplete="email" />
                        <span class="field-icon">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                                </path>
                                <polyline points="22,6 12,13 2,6"></polyline>
                            </svg>
                        </span>
                    </div>
                </div>

                <div class="field">
                    <label class="field-label" for="password">Senha</label>
                    <div class="field-wrap">
                        <input type="password" id="password" class="field-input" placeholder="Mínimo 8 caracteres"
                            autocomplete="new-password" />
                        <span class="field-icon">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </span>
                        <button type="button" class="pwd-toggle" id="pwdToggle">
                            <svg id="eyeIcon" width="13" height="13" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <div class="pwd-strength" id="pwdStrength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <span class="strength-label" id="strengthLabel">—</span>
                    </div>
                </div>

                <div class="field">
                    <label class="field-label" for="confirmPassword">Confirmar senha</label>
                    <div class="field-wrap">
                        <input type="password" id="confirmPassword" class="field-input" placeholder="Repita a senha"
                            autocomplete="new-password" />
                        <span class="field-icon">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                        </span>
                    </div>
                </div>

                <div id="msgBox" class="msg-box"></div>

                <div class="terms-wrap">
                    <input type="checkbox" id="terms" />
                    <span>Li e aceito os <a href="#">Termos de Uso</a> e a <a href="#">Política de
                            Privacidade</a>.</span>
                </div>

                <button type="submit" class="btn-primary" id="registerBtn">Criar minha conta</button>

            </form>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">ou</span>
                <div class="divider-line"></div>
            </div>

            <p class="card-footer">Já tem conta? <a href="../login/index.html">Entrar</a></p>

        </div>
    </div>

    <script src="register.js"></script>

</body>

</html>
